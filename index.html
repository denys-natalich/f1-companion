<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>F1 Companion</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0507" />

  <!-- iOS home screen install support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="F1" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" href="icons/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>F1</h1>
  </header>

  <main id="content"></main>

  <nav class="tab-bar">
    <button class="tab-btn active" data-tab="race">
      <span class="tab-icon">🏁</span>
      <span>Races</span>
    </button>
    <button class="tab-btn" data-tab="standings">
      <span class="tab-icon">📊</span>
      <span>Standings</span>
    </button>
    <button class="tab-btn" data-tab="settings">
      <span class="tab-icon">⚙️</span>
      <span>Settings</span>
    </button>
  </nav>

  <script src="js/styling.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/views.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
